openapi: 3.0.3
info:
  title: TT Stock API - Authentication
  description: Authentication endpoints for TT Stock Backend API
  version: 1.0.0
  contact:
    name: TT Stock API
    email: support@ttstock.com

servers:
  - url: https://api.ttstock.com/v1
    description: Production server
  - url: http://localhost:8080/v1
    description: Development server

paths:
  /auth/login:
    post:
      summary: User login with phone number and PIN
      description: Authenticate user with phone number and PIN, returns JWT token
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - phoneNumber
                - pin
              properties:
                phoneNumber:
                  type: string
                  pattern: '^[0-9]{10,15}$'
                  example: "1234567890"
                  description: User's phone number (10-15 digits)
                pin:
                  type: string
                  pattern: '^[0-9]{4,6}$'
                  example: "1234"
                  description: User's PIN (4-6 digits)
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Login successful"
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                        example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                        description: JWT token valid for 1 day
                      user:
                        $ref: '#/components/schemas/User'
                      expiresAt:
                        type: string
                        format: date-time
                        example: "2024-09-22T12:00:00Z"
                        description: Token expiration time
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/logout:
    post:
      summary: User logout
      description: Invalidate current JWT token
      tags:
        - Authentication
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Logout successful"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/refresh:
    post:
      summary: Refresh JWT token
      description: Get new JWT token using current valid token
      tags:
        - Authentication
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Token refreshed successfully"
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                        example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                        description: New JWT token valid for 1 day
                      expiresAt:
                        type: string
                        format: date-time
                        example: "2024-09-22T12:00:00Z"
                        description: New token expiration time
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/me:
    get:
      summary: Get current user profile
      description: Get current authenticated user's profile information
      tags:
        - Authentication
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User profile retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "User profile retrieved successfully"
                  data:
                    $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        phoneNumber:
          type: string
          example: "1234567890"
        name:
          type: string
          example: "John Doe"
        role:
          type: string
          enum: [Admin, Owner, Staff]
          example: "Staff"
        isActive:
          type: boolean
          example: true
        createdAt:
          type: string
          format: date-time
          example: "2024-09-21T10:00:00Z"
        lastLoginAt:
          type: string
          format: date-time
          example: "2024-09-21T10:00:00Z"
          nullable: true

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: "Error message"
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
                example: "phoneNumber"
              message:
                type: string
                example: "Phone number is required"

  responses:
    BadRequest:
      description: Bad request - validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            message: "Validation failed"
            errors:
              - field: "phoneNumber"
                message: "Phone number must be 10-15 digits"

    Unauthorized:
      description: Unauthorized - invalid credentials or token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            message: "Invalid credentials"

    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            message: "Internal server error"
