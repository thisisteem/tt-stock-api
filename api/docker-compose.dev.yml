version: '3.8'

services:
  # PostgreSQL Database for Development
  postgres:
    image: postgres:15-alpine
    container_name: tt-stock-postgres-dev
    environment:
      POSTGRES_DB: ttstock_dev
      POSTGRES_USER: ttstock_user
      POSTGRES_PASSWORD: ttstock_password
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    networks:
      - tt-stock-dev-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ttstock_user -d ttstock_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for Development (Caching & Sessions)
  redis:
    image: redis:7-alpine
    container_name: tt-stock-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    networks:
      - tt-stock-dev-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes

  # Development API with Hot Reload
  api-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: tt-stock-api-dev
    environment:
      # Server configuration
      SERVER_PORT: 8080
      SERVER_HOST: 0.0.0.0
      SERVER_READ_TIMEOUT: 30s
      SERVER_WRITE_TIMEOUT: 30s
      SERVER_IDLE_TIMEOUT: 60s
      
      # Database configuration
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ttstock_user
      DB_PASSWORD: ttstock_password
      DB_NAME: ttstock_dev
      DB_SSL_MODE: disable
      DB_MAX_OPEN_CONNS: 20
      DB_MAX_IDLE_CONNS: 5
      DB_CONN_MAX_IDLE_TIME: 30m
      
      # JWT configuration
      JWT_SECRET_KEY: dev-secret-key-not-for-production
      JWT_TOKEN_LIFETIME: 24h
      
      # Application configuration
      APP_NAME: TT Stock API
      APP_VERSION: 1.0.0
      APP_ENVIRONMENT: development
      APP_LOG_LEVEL: debug
      
      # Security configuration
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:8080,http://localhost:5173
      CORS_ALLOWED_METHODS: GET,POST,PUT,DELETE,OPTIONS
      CORS_ALLOWED_HEADERS: Content-Type,Authorization
      RATE_LIMIT_REQUESTS_PER_MINUTE: 1000
      RATE_LIMIT_BURST: 100
      
      # Middleware configuration
      REQUEST_SIZE_LIMIT: 10MB
      REQUEST_TIMEOUT: 30s
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - tt-stock-dev-network
    volumes:
      - .:/app
      - /app/vendor
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # pgAdmin for Database Management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: tt-stock-pgadmin-dev
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ttstock.dev
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - tt-stock-dev-network
    volumes:
      - pgadmin_dev_data:/var/lib/pgadmin
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json

  # Redis Commander for Redis Management
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: tt-stock-redis-commander-dev
    environment:
      REDIS_HOSTS: local:redis:6379
      HTTP_USER: admin
      HTTP_PASSWORD: admin123
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - tt-stock-dev-network

  # Mailhog for Email Testing
  mailhog:
    image: mailhog/mailhog:latest
    container_name: tt-stock-mailhog-dev
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    networks:
      - tt-stock-dev-network

volumes:
  postgres_dev_data:
    driver: local
  redis_dev_data:
    driver: local
  pgadmin_dev_data:
    driver: local

networks:
  tt-stock-dev-network:
    driver: bridge
