apiVersion: v1
kind: ConfigMap
metadata:
  name: tt-stock-config
  namespace: team-dev
data:
  # Server configuration
  SERVER_PORT: "8080"
  SERVER_HOST: "0.0.0.0"
  
  # Database configuration
  DB_HOST: "postgres-service"
  DB_PORT: "5432"
  DB_USER: "postgres"
  DB_NAME: "tt_stock"
  DB_SSL_MODE: "disable"
  DB_MAX_OPEN_CONNS: "20"
  DB_MAX_IDLE_CONNS: "5"
  
  # JWT configuration
  JWT_TOKEN_LIFETIME: "24h"
  
  # Application configuration
  APP_ENV: "production"
  LOG_LEVEL: "info"
